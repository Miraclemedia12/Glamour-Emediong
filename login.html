<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glamour Login | Access Your Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --gold: #F5C24C;
            --dark-gold: #D4A017;
            --bg: #0e0e0e;
            --error: #ff4d4d;
        }

        body {
            margin: 0;
            background: var(--bg);
            font-family: 'Poppins', sans-serif;
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .luxury-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, #1a1a1a 0%, #0e0e0e 100%);
            z-index: -1;
        }

        .gold-text {
            background: linear-gradient(135deg, #fff5c0, var(--gold), var(--dark-gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-logo {
            font-family: 'Cinzel', serif;
            font-size: 32px;
            letter-spacing: 6px;
            padding: 40px 20px 20px;
        }

        .login-card {
            width: 95%;
            max-width: 450px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(245, 194, 76, 0.2);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            margin-top: 20px;
        }

        .form-group label {
            display: block;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 8px;
            color: var(--gold);
            font-weight: 600;
        }

        .input-container { position: relative; }

        .form-group input {
            width: 100%;
            padding: 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(245, 194, 76, 0.1);
            border-radius: 12px;
            color: white;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--gold);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 15px rgba(245, 194, 76, 0.1);
        }

        .toggle-password {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: rgba(245, 194, 76, 0.5);
        }

        .btn-gold {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, var(--gold), var(--dark-gold));
            color: #000;
            font-weight: 800;
            border-radius: 12px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            transition: 0.3s;
            cursor: pointer;
            border: none;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .btn-gold:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .custom-alert {
            position: fixed;
            top: 20px;
            right: -400px;
            width: 90%;
            max-width: 350px;
            padding: 15px 20px;
            border-radius: 12px;
            background: #1a1a1a;
            border-left: 4px solid var(--error);
            display: flex;
            align-items: center;
            gap: 12px;
            transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 10000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .custom-alert.active { right: 20px; }

        .spinner {
            width: 20px;
            height: 20px;
            border: 3px solid rgba(0,0,0,0.3);
            border-top: 3px solid #000;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            display: none;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="luxury-bg"></div>
<div class="nav-logo gold-text">GLAMOUR</div>

<div class="login-card">
    <h2 class="text-3xl font-bold text-center mb-2" style="font-family: 'Cinzel', serif;">Welcome Back</h2>
    <p class="text-gray-400 text-center text-xs mb-8 tracking-widest uppercase">Premium Creator Portal</p>

    <form id="login-form" class="space-y-6">
        <div class="form-group">
            <label>Username or Email</label>
            <div class="input-container">
                <input type="text" id="login-identifier" placeholder="Username or Email" required>
            </div>
        </div>

        <div class="form-group">
            <label>Password</label>
            <div class="input-container">
                <input type="password" id="login-password" placeholder="••••••••" required>
                <i class="fas fa-eye toggle-password" id="toggle-eye"></i>
            </div>
        </div>

        <div class="flex justify-between items-center text-[11px]">
            <label class="flex items-center gap-2 cursor-pointer">
                <input type="checkbox" class="accent-[#F5C24C]"> Remember Me
            </label>
            <a href="#" class="text-gold-500 hover:underline" style="color: var(--gold);">Forgot Password?</a>
        </div>

        <button type="submit" id="login-btn" class="btn-gold">
            <div id="btn-spinner" class="spinner"></div>
            <span id="btn-text">Sign In</span>
        </button>

        <p class="text-center text-gray-500 text-xs mt-6">
            Don't have an account? <a href="register.html" class="text-white hover:underline">Apply Now</a>
        </p>
    </form>
</div>

<div id="custom-alert" class="custom-alert">
    <i class="fas fa-circle-exclamation text-red-500"></i>
    <span id="alert-msg" class="text-xs text-white"></span>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyD41bc_RG0TAgX7fQEvXXfKwz8n84Otqw0",
        authDomain: "glamour-emediong.firebaseapp.com",
        projectId: "glamour-emediong",
        storageBucket: "glamour-emediong.firebasestorage.app",
        messagingSenderId: "830329910063",
        appId: "1:830329910063:web:3867b3467f244c52b0a7da",
        measurementId: "G-VMC8M8TNVT"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const loginForm = document.getElementById('login-form');
    const loginBtn = document.getElementById('login-btn');
    const btnText = document.getElementById('btn-text');
    const btnSpinner = document.getElementById('btn-spinner');
    const alertBox = document.getElementById('custom-alert');
    const alertMsg = document.getElementById('alert-msg');

    function notify(message) {
        alertMsg.innerText = message;
        alertBox.classList.add('active');
        setTimeout(() => alertBox.classList.remove('active'), 4000);
    }

    document.getElementById('toggle-eye').addEventListener('click', function() {
        const passInput = document.getElementById('login-password');
        if (passInput.type === "password") {
            passInput.type = "text";
            this.classList.replace("fa-eye", "fa-eye-slash");
        } else {
            passInput.type = "password";
            this.classList.replace("fa-eye-slash", "fa-eye");
        }
    });

    loginForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const identifier = document.getElementById('login-identifier').value.trim().toLowerCase();
        const password = document.getElementById('login-password').value;

        loginBtn.disabled = true;
        btnSpinner.style.display = "block";
        btnText.innerText = "Verifying...";

        let finalEmail = identifier;
        let finalUsername = identifier;

        try {
            // Check if identifier is a username or email
            if (!identifier.includes('@')) {
                const userRef = doc(db, "users", identifier);
                const userSnap = await getDoc(userRef);
                
                if (userSnap.exists()) {
                    finalEmail = userSnap.data().email;
                    finalUsername = identifier;
                } else {
                    throw { code: 'auth/user-not-found' };
                }
            } else {
                // If they used email, we should find their username for the dashboard session
                // This is optional but good for your "Glamour" logic
                finalUsername = identifier.split('@')[0]; 
            }

            // Perform Authentication
            const userCredential = await signInWithEmailAndPassword(auth, finalEmail, password);
            
            // Save username to local storage for the dashboard to display the user's name
            localStorage.setItem('glamour_username', finalUsername);
            
            window.location.href = "dashboard.html"; 

        } catch (error) {
            console.error("Login Error:", error);
            loginBtn.disabled = false;
            btnSpinner.style.display = "none";
            btnText.innerText = "Sign In";

            let errorText = "Authentication failed. Please try again.";
            if (error.code === 'auth/user-not-found' || error.code === 'auth/invalid-credential') errorText = "Invalid login details.";
            if (error.code === 'auth/wrong-password') errorText = "Incorrect password.";
            if (error.code === 'auth/invalid-email') errorText = "Please enter a valid email or username.";
            
            notify(errorText);
        }
    });
</script>

</body>
</html>
